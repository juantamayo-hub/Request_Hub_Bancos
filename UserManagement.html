<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Management - People Hub</title>
  <?!= HtmlService.createHtmlOutputFromFile('Styles').getContent(); ?>
  <style>
    body {
      padding: var(--spacing-lg);
    }

    .page-header {
      margin-bottom: var(--spacing-xl);
    }

    .page-title {
      font-size: 1.875rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: var(--spacing-sm);
    }

    .page-subtitle {
      color: var(--gray-600);
    }

    .actions-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-lg);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: var(--radius-lg);
      width: 90%;
      max-width: 500px;
      box-shadow: var(--shadow-xl);
    }

    .modal-header {
      padding: var(--spacing-lg);
      border-bottom: 1px solid var(--gray-200);
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .modal-body {
      padding: var(--spacing-lg);
    }

    .modal-footer {
      padding: var(--spacing-lg);
      border-top: 1px solid var(--gray-200);
      display: flex;
      gap: var(--spacing-md);
      justify-content: flex-end;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Back Link -->
    <div style="margin-bottom: var(--spacing-lg);">
      <a href="<?= appUrl ?>" class="btn btn-ghost btn-sm">← Back to Dashboard</a>
    </div>

    <!-- Page Header -->
    <div class="page-header">
      <h1 class="page-title">👥 User Management</h1>
      <p class="page-subtitle">Manage user accounts and roles for People Hub</p>
    </div>

    <!-- Actions Bar -->
    <div class="actions-bar">
      <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="Search users...">
        <span class="search-icon">🔍</span>
      </div>
      <button class="btn btn-primary" onclick="openAddUserModal()">+ Add User</button>
    </div>

    <!-- Loading State -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
    </div>

    <!-- Users Table -->
    <div id="usersTable" class="card hidden">
      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr>
              <th>Email</th>
              <th>First Name</th>
              <th>Last Name</th>
              <th>Role</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state hidden">
      <div class="empty-state-icon">👤</div>
      <h3 class="empty-state-title">No users found</h3>
      <p class="empty-state-text">Click "Add User" to create the first user.</p>
    </div>

    <!-- Alert -->
    <div id="alert" class="alert hidden"></div>
  </div>

  <!-- Add/Edit User Modal -->
  <div id="userModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Add User</h3>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editingEmail">
        <div class="form-group">
          <label class="form-label" for="email">Email *</label>
          <input type="email" id="email" class="form-input" placeholder="user@huspy.io" required>
          <p class="form-helper">Must be a @huspy.io email address</p>
        </div>
        <div class="form-group">
          <label class="form-label" for="firstName">First Name</label>
          <input type="text" id="firstName" class="form-input" placeholder="Juan">
        </div>
        <div class="form-group">
          <label class="form-label" for="lastName">Last Name</label>
          <input type="text" id="lastName" class="form-input" placeholder="Tamayo">
        </div>
        <div class="form-group">
          <label class="form-label" for="role">Role *</label>
          <select id="role" class="form-select" required>
            <option value="employee">Employee</option>
            <option value="people_admin">People Admin</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeUserModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveUser()">Save</button>
      </div>
    </div>
  </div>

  <script>
    let allUsers = [];

    function init() {
      loadUsers();
      setupSearch();
    }

    function loadUsers() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('usersTable').classList.add('hidden');
      document.getElementById('emptyState').classList.add('hidden');

      google.script.run
        .withSuccessHandler(function (users) {
          allUsers = users;
          renderUsers(users);
          document.getElementById('loading').classList.add('hidden');
          if (users.length > 0) {
            document.getElementById('usersTable').classList.remove('hidden');
          } else {
            document.getElementById('emptyState').classList.remove('hidden');
          }
        })
        .withFailureHandler(function (error) {
          showAlert('Error loading users: ' + error.message, 'error');
          document.getElementById('loading').classList.add('hidden');
        })
        .getAllUsersFromUi();
    }

    function renderUsers(users) {
      const tbody = document.getElementById('usersTableBody');
      tbody.innerHTML = '';

      users.forEach(function (user) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><strong>${escapeHtml(user.email)}</strong></td>
          <td>${escapeHtml(user.firstName)}</td>
          <td>${escapeHtml(user.lastName)}</td>
          <td>
            <span class="role-badge ${user.role === 'people_admin' ? 'admin' : 'employee'}">
              ${user.role === 'people_admin' ? 'Admin' : 'Employee'}
            </span>
          </td>
          <td>
            <button class="btn btn-ghost btn-sm" onclick="editUser('${user.email.replace(/'/g, "\\'")}')">Edit</button>
            <button class="btn btn-ghost btn-sm" style="color: var(--error-red);" onclick="confirmDeleteUser('${user.email.replace(/'/g, "\\'")}')">Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function setupSearch() {
      document.getElementById('searchInput').addEventListener('input', function (e) {
        const query = e.target.value.toLowerCase();
        const filtered = allUsers.filter(function (user) {
          return user.email.toLowerCase().includes(query) ||
            user.firstName.toLowerCase().includes(query) ||
            user.lastName.toLowerCase().includes(query) ||
            user.role.toLowerCase().includes(query);
        });
        renderUsers(filtered);
      });
    }

    function openAddUserModal() {
      document.getElementById('modalTitle').textContent = 'Add User';
      document.getElementById('editingEmail').value = '';
      document.getElementById('email').value = '';
      document.getElementById('email').readOnly = false;
      document.getElementById('firstName').value = '';
      document.getElementById('lastName').value = '';
      document.getElementById('role').value = 'employee';
      document.getElementById('userModal').classList.add('active');
    }

    function editUser(email) {
      const user = allUsers.find(function (u) { return u.email === email; });
      if (!user) return;

      document.getElementById('modalTitle').textContent = 'Edit User';
      document.getElementById('editingEmail').value = user.email;
      document.getElementById('email').value = user.email;
      document.getElementById('email').readOnly = true;
      document.getElementById('firstName').value = user.firstName;
      document.getElementById('lastName').value = user.lastName;
      document.getElementById('role').value = user.role;
      document.getElementById('userModal').classList.add('active');
    }

    function closeUserModal() {
      document.getElementById('userModal').classList.remove('active');
    }

    function saveUser() {
      const email = document.getElementById('email').value.trim();
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const role = document.getElementById('role').value;

      if (!email) {
        alert('Email is required');
        return;
      }

      if (!email.endsWith('@huspy.io')) {
        alert('Email must be a @huspy.io address');
        return;
      }

      google.script.run
        .withSuccessHandler(function (result) {
          if (result.success) {
            showAlert('User saved successfully', 'success');
            closeUserModal();
            loadUsers();
          } else {
            showAlert('Error: ' + result.error, 'error');
          }
        })
        .withFailureHandler(function (error) {
          showAlert('Error saving user: ' + error.message, 'error');
        })
        .saveUserFromUi(email, role, firstName, lastName);
    }

    function confirmDeleteUser(email) {
      if (!confirm('Are you sure you want to delete user: ' + email + '?')) {
        return;
      }

      google.script.run
        .withSuccessHandler(function (result) {
          if (result.success) {
            showAlert('User deleted successfully', 'success');
            loadUsers();
          } else {
            showAlert('Error: ' + result.error, 'error');
          }
        })
        .withFailureHandler(function (error) {
          showAlert('Error deleting user: ' + error.message, 'error');
        })
        .deleteUserFromUi(email);
    }

    function showAlert(message, type) {
      const alert = document.getElementById('alert');
      alert.className = 'alert alert-' + type;
      alert.textContent = message;
      alert.classList.remove('hidden');
      setTimeout(function () {
        alert.classList.add('hidden');
      }, 5000);
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Init on load
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>

</html>
