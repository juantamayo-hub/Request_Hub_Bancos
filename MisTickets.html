<div style="margin-bottom: 32px;">
  <h1 style="font-size: 28px; font-weight: 800; letter-spacing: -0.5px; color: var(--text-main);">My Requests</h1>
  <p style="color: var(--text-muted); font-size: 14px;">History and tracking of your procedures with People Ops.</p>
</div>

<div class="card">
  <div
    style="padding: 16px 20px; border-bottom: 1px solid var(--border-subtle); background: #FAFAFB; display: flex; justify-content: space-between; align-items: center;">
    <h3 style="font-size: 14px; font-weight: 700; color: var(--text-main);">Ticket List</h3>
    <a href="<?= appUrl ?>?page=crear-ticket" class="btn btn-primary btn-sm">+ New Request</a>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Subject</th>
          <th>Category</th>
          <th>Status</th>
          <th>Last Update</th>
        </tr>
      </thead>
      <tbody id="tickets-tbody">
        <tr>
          <td colspan="5" style="text-align: center; padding: 40px; color: var(--text-muted);">Finding your tickets...
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  function loadMyTickets() {
    google.script.run.withSuccessHandler(renderTable).getMyTickets();
  }

  function renderTable(tickets) {
    const tbody = document.getElementById('tickets-tbody');
    tbody.innerHTML = '';

    if (!tickets || tickets.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 60px;">' +
        '<div style="font-size: 40px; margin-bottom: 16px;">📭</div>' +
        '<div style="font-weight: 600; color: var(--text-main);">You have no open requests</div>' +
        '<div style="font-size: 13px; color: var(--text-muted); margin-top: 8px;">When you create one, it will appear here.</div>' +
        '</td></tr>';
      return;
    }

    tickets.forEach(t => {
      const row = document.createElement('tr');
      row.style.cursor = 'pointer';
      row.onclick = () => window.location.href = '<?= appUrl ?>?page=detail&id=' + t.ticketId;

      let badgeClass = 'badge-status-new';
      if (t.status === 'In Progress') badgeClass = 'badge-status-progress';
      if (t.status === 'Waiting on Employee') badgeClass = 'badge-status-waiting';
      if (t.status === 'Resolved' || t.status === 'Closed') badgeClass = 'badge-status-resolved';

      row.innerHTML = `
        <td style="font-weight: 700; color: var(--brand-orange);">${t.ticketId}</td>
        <td style="font-weight: 500;">${escapeHtml(t.subject)}</td>
        <td style="color: var(--text-muted); font-size: 13px;">${t.category}</td>
        <td><span class="badge ${badgeClass}">${t.status}</span></td>
        <td style="font-size: 13px; color: var(--text-muted);">${new Date(t.lastUpdatedAt).toLocaleDateString()}</td>
      `;
      tbody.appendChild(row);
    });
  }

  window.onload = loadMyTickets;
</script>
