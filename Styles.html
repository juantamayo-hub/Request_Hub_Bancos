<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
        /* Huspy Brand */
        --brand-orange: #FF6B35;
        --brand-orange-hover: #E55A2B;
        --brand-orange-light: #FFF0EB;

        /* SaaS Palette */
        --bg-app: #F8F9FB;
        --bg-card: #FFFFFF;
        --border-subtle: #E2E8F0;
        --text-main: #1A202C;
        --text-muted: #64748B;
        --text-inverse: #FFFFFF;

        /* Status Colors (Professional) */
        --status-new-bg: #EBF8FF;
        --status-new-text: #2B6CB0;
        --status-progress-bg: #FFFBEB;
        --status-progress-text: #B45309;
        --status-waiting-bg: #FAF5FF;
        --status-waiting-text: #6B46C1;
        --status-resolved-bg: #F0FFF4;
        --status-resolved-text: #2F855A;
        --status-closed-bg: #EDF2F7;
        --status-closed-text: #4A5568;

        /* Tokens */
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Inter', -apple-system, system-ui, sans-serif;
        background-color: var(--bg-app);
        color: var(--text-main);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
    }

    /* --- Layout Components --- */
    .app-header {
        height: 64px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border-subtle);
        position: sticky;
        top: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
    }

    .header-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 24px;
    }

    .brand-logo {
        height: 28px;
        display: flex;
        align-items: center;
    }

    .brand-logo img {
        height: 100%;
        width: auto;
    }

    .nav-menu {
        display: flex;
        gap: 4px;
    }

    .nav-item {
        text-decoration: none;
        color: var(--text-muted);
        font-size: 14px;
        font-weight: 500;
        padding: 8px 16px;
        border-radius: var(--radius-sm);
        transition: var(--transition);
    }

    .nav-item:hover {
        color: var(--brand-orange);
        background: var(--brand-orange-light);
    }

    .nav-item.active {
        color: var(--brand-orange);
        background: var(--brand-orange-light);
        font-weight: 600;
    }

    /* --- SaaS Components --- */
    .container {
        max-width: 1200px;
        margin: 32px auto;
        padding: 0 24px;
    }

    .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-sm);
        overflow: hidden;
    }

    .metrics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 32px;
    }

    .metric-card {
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .metric-card .label {
        font-size: 11px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
    }

    .metric-card .value {
        font-size: 32px;
        font-weight: 700;
        color: var(--text-main);
        line-height: 1;
    }

    /* --- Modern Buttons --- */
    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 20px;
        border-radius: var(--radius-sm);
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        border: 1px solid transparent;
        transition: var(--transition);
        gap: 8px;
        font-family: inherit;
        text-decoration: none;
    }

    .btn-primary {
        background: var(--brand-orange);
        color: white;
        border: none;
    }

    .btn-primary:hover {
        background: var(--brand-orange-hover);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(255, 107, 53, 0.2);
    }

    .btn-secondary {
        background: white;
        border: 1px solid var(--border-subtle);
        color: var(--text-main);
    }

    .btn-secondary:hover {
        background: var(--bg-app);
        border-color: var(--text-muted);
    }

    .btn-ghost {
        background: transparent;
        border: none;
        color: var(--text-muted);
    }

    .btn-ghost:hover {
        background: var(--brand-orange-light);
        color: var(--brand-orange);
    }

    .btn-sm {
        padding: 6px 12px;
        font-size: 13px;
    }

    /* --- Tables (Linear Style) --- */
    .table-container {
        border-radius: var(--radius-md);
        overflow: hidden;
        border: 1px solid var(--border-subtle);
        background: white;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th {
        background: #FAFAFB;
        padding: 12px 16px;
        text-align: left;
        font-size: 11px;
        font-weight: 700;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border-subtle);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    td {
        padding: 16px;
        font-size: 14px;
        border-bottom: 1px solid var(--border-subtle);
        color: var(--text-main);
    }

    tr:last-child td {
        border-bottom: none;
    }

    tr:hover td {
        background: #FDFDFD;
    }

    /* --- Badges --- */
    .badge {
        padding: 4px 12px;
        border-radius: 99px;
        font-size: 12px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }

    .badge-status-new {
        background: var(--status-new-bg);
        color: var(--status-new-text);
    }

    .badge-status-progress {
        background: var(--status-progress-bg);
        color: var(--status-progress-text);
    }

    .badge-status-waiting {
        background: var(--status-waiting-bg);
        color: var(--status-waiting-text);
    }

    .badge-status-resolved {
        background: var(--status-resolved-bg);
        color: var(--status-resolved-text);
    }

    .badge-status-closed {
        background: var(--status-closed-bg);
        color: var(--status-closed-text);
    }

    /* --- Forms --- */
    .form-group {
        margin-bottom: 24px;
    }

    .form-label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 8px;
    }

    .form-control {
        width: 100%;
        padding: 12px 16px;
        font-size: 14px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: white;
        transition: var(--transition);
        font-family: inherit;
    }

    .form-control:focus {
        outline: none;
        border-color: var(--brand-orange);
        box-shadow: 0 0 0 3px var(--brand-orange-light);
    }

    /* Animations */
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(8px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .fade-in {
        animation: fadeIn 0.4s ease-out forwards;
    }

    .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
    }

    .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--border-subtle);
        border-top-color: var(--brand-orange);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    /* Utility */
    .mb-8 {
        margin-bottom: 32px;
    }

    .text-muted {
        color: var(--text-muted);
    }

    .font-bold {
        font-weight: 700;
    }
</style>
