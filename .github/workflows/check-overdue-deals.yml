name: Check Overdue Deals

on:
  schedule:
    # 8:00 and 14:00 Madrid time (CEST, UTC+2) — Monday to Friday
    - cron: '0 6 * * 1-5'   # 8am Madrid
    - cron: '0 12 * * 1-5'  # 2pm Madrid
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Trigger overdue deal checks by stage
        run: |
          set -euo pipefail

          call() {
            local path="$1"
            echo "Triggering ${path}"
            curl -f --location-trusted --retry 2 --retry-delay 3 --max-time 120 -X GET \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.APP_URL }}${path}"
            echo
          }

          call "/api/cron/check-overdue-deals?stageId=70"
          call "/api/cron/check-overdue-deals?stageId=72"
          call "/api/cron/check-overdue-deals?stageId=73"
          call "/api/cron/check-overdue-deals?mode=autoclose"
